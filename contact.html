<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Basic -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <!-- Mobile Metas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <!-- Site Metas -->
  <meta name="keywords" content="NeuroMed AI, Contact, Health Prediction" />
  <meta name="description" content="Contact NeuroMed AI team for inquiries or support." />
  <meta name="author" content="NeuroMed AI Team" />

  <title>Contact | NeuroMed AI</title>

  <!-- Slider stylesheet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" />

  <!-- Bootstrap core css -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.css') }}" />

  <!-- Fonts style -->
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700|Poppins:400,700&display=swap" rel="stylesheet">

  <!-- Custom styles -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />

  <!-- Responsive style -->
  <link href="{{ url_for('static', filename='css/responsive.css') }}" rel="stylesheet" />
</head>

<body class="sub_page">
  <div class="hero_area">
    <!-- header section -->
    <header class="header_section">
      <div class="container-fluid">
        <nav class="navbar navbar-expand-lg custom_nav-container pt-3">
          <a class="navbar-brand" href="{{ url_for('home') }}">
            <span>NeuroMed AI</span>
          </a>

          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <div class="d-flex ml-auto flex-column flex-lg-row align-items-center">
              <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">Test</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('do') }}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('portfolio') }}">Scan</a></li>
                <li class="nav-item active"><a class="nav-link" href="{{ url_for('contact') }}">Contact Us <span class="sr-only">(current)</span></a></li>
              </ul>
              <div class="user_option">
                <a href="#">
                  <img src="{{ url_for('static', filename='images/user.png') }}" alt="User Icon">
                </a>
              </div>
            </div>
          </div>
        </nav>
      </div>
    </header>
    <!-- end header section -->
  </div>

  <!-- Contact section -->
  <section class="contact_section layout_padding">
    <div class="container">
      <div class="heading_container text-center">
        <h2>Request A Call Back</h2>
        <p>Have questions or need assistance? Fill in your details and we’ll get back to you shortly.</p>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="contact-form">
            <form id="contactForm" method="POST" action="#">
              <div class="form-group">
                <input type="text" class="form-control" placeholder="Full Name" required>
              </div>
              <div class="form-group">
                <input type="tel" class="form-control" placeholder="Phone Number" required>
              </div>
              <div class="form-group">
                <input type="email" class="form-control" placeholder="Email Address" required>
              </div>
              <div class="form-group">
                <textarea class="form-control" rows="4" placeholder="Message" required></textarea>
              </div>
              <div class="text-center">
                <button type="submit" class="btn_on-hover">Send Message</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="map_img-box text-center mt-5">
        <img src="{{ url_for('static', filename='images/map-img.png') }}" alt="Map" class="img-fluid rounded shadow">
      </div>
    </div>
  </section>
  <!-- End contact section -->

  <!-- JS scripts -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="{{ url_for('static', filename='js/bootstrap.js') }}"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>

  <script>
    $(".owl-carousel").owlCarousel({
      loop: true,
      margin: 0,
      center: true,
      autoplay: true,
      autoplayHoverPause: true,
      responsive: {
        0: { items: 1 },
        1000: { items: 3 }
      }
    });
  </script>

</body>

</html>
